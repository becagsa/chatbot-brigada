<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Brigada de Incêndio</title>

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <section class="chat-card">

            <header class="chat-header">

                <div class="logo">
                    🔥
                </div>

                <div>

                    <h1>Chatbot Brigada de Incêndio</h1>

                    <p>
                        Assistente especializado em prevenção, combate a incêndio e evacuação.
                    </p>

                </div>

            </header>

            <section id="chat" class="chat-box">

                <div class="message bot">

                    👋 Olá!

                    Sou um assistente especializado em Brigada de Incêndio.

                    Posso responder dúvidas sobre:

                    • Extintores

                    • Classes de incêndio

                    • Evacuação

                    • Primeiros procedimentos

                    • Normas básicas

                </div>

            </section>

            <section class="input-area">

                <textarea id="mensagem"
                    placeholder="Digite sua pergunta..."
                    rows="3"></textarea>

                <div class="buttons">

                    <button id="btnEnviar">

                        <i class="fa-solid fa-paper-plane"></i>

                        Enviar

                    </button>

                    <button id="btnLimpar" class="secondary">

                        <i class="fa-solid fa-trash"></i>

                        Limpar

                    </button>

                </div>

            </section>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
